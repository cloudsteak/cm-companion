apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: evolvia-backend-core-cert
  namespace: istio-system
  labels:
    environment: production
    app: evolvia-backend
    component: backend-core
    type: ingress
    managed-by: argocd
spec:
  secretName: evolvia-backend-core-app-tls
  issuerRef:
    name: letsencrypt-dns01
    kind: ClusterIssuer
  dnsNames:
    - "evolvia.api.cloud-mentor.hu"
