apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: evolvia-verify-lab-aws-secret
  namespace: evolvia-backend-prod
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: evolvia-verify-lab-aws-secret
  data:
    - secretKey: AWS_REGION
      remoteRef:
        key: /prod/app/evolvia-verify-lab/credentials
        property: aws.region
    - secretKey: AWS_ACCOUNT_ID
      remoteRef:
        key: /prod/app/evolvia-verify-lab/credentials
        property: aws.account_id
    - secretKey: AWS_ACCESS_KEY_ID
      remoteRef:
        key: /prod/app/evolvia-verify-lab/credentials
        property: aws.access_key_id
    - secretKey: AWS_SECRET_ACCESS_KEY
      remoteRef:
        key: /prod/app/evolvia-verify-lab/credentials
        property: aws.secret_access_key
    - secretKey: INTERNAL_VERIFY_AWS_API_KEY
      remoteRef:
        key: /prod/app/evolvia-verify-lab/credentials
        property: security.internal_verify_aws_api_key
