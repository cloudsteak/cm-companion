apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: n8n-automation-postgres
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    environment: production
    app: n8n-automation
    component: postgres
    type: database
spec:
  project: cloudmentor
  destination:
    server: https://kubernetes.default.svc
    namespace: n8n-prod
  source:
    repoURL: https://github.com/cloudsteak/cm-companion
    targetRevision: main
    path: apps/production/n8n-automation/components/postgres/manifests
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
