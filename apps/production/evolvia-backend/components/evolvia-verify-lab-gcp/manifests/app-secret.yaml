apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: evolvia-verify-lab-gcp-secret
  namespace: evolvia-backend-prod
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: evolvia-verify-lab-gcp-secret
  data:
    - secretKey: GCP_PROJECT_ID
      remoteRef:
        key: /prod/app/evolvia-verify-lab/credentials
        property: gcp.project_id
    - secretKey: INTERNAL_VERIFY_API_KEY
      remoteRef:
        key: /prod/app/evolvia-verify-lab/credentials
        property: security.internal_api_key
