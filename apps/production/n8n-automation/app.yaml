apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: n8n-automation
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: cloudmentor
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  source:
    repoURL: https://github.com/cloudsteak/cm-companion
    targetRevision: main
    path: apps/production/n8n-automation/components
    directory:
      recurse: true
      include: "application.yaml"
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
