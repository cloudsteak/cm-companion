apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: n8n-prod-cert
  namespace: istio-system
  labels:
    environment: production
    app: n8n-automation
    component: n8n
    type: ingress
    managed-by: argocd
spec:
  secretName: n8n-prod-tls
  issuerRef:
    name: letsencrypt-dns01
    kind: ClusterIssuer
  dnsNames:
    - n8n.tools.cloud-mentor.hu
