apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: evolvia-verify-lab-aws-secret
  namespace: evolvia-backend-prod
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: evolvia-verify-lab-aws-secret
  data:
    - secretKey: AWS_REGION
      remoteRef:
        key: /prod/app/evolvia-verify-lab/credentials
        property: aws.region
    - secretKey: AWS_ACCOUNT_ID
      remoteRef:
        key: /prod/app/evolvia-verify-lab/credentials
        property: aws.account_id
    - secretKey: INTERNAL_VERIFY_API_KEY
      remoteRef:
        key: /prod/app/evolvia-verify-lab/credentials
        property: security.internal_api_key
